<body class="font-inter min-h-screen flex flex-col overflow-x-hidden selection:bg-accent selection:text-background">
    
    <div id="flash-overlay" class="pointer-events-none fixed inset-0 z-[100] opacity-0 transition-opacity duration-1000"></div>

    <script>
        /*******************************************************
         * 0. GAME CONFIGURATION
         *******************************************************/
        const CONFIG = {
            EARTH_RADIUS_KM: 6371,
            LATENCY_BASE_MS: 300, LATENCY_PER_KM_MS: 0.12,
            HEMISPHERE_THRESHOLD_KM: 10000, HEMISPHERE_NOISE_MULT: 3.0,
            THREATS: {
                EASY: { label: "DEFCON 3 (EASY)", attempts: 15, defuseKm: 50, noisePct: 0.00, superScans: 3, superFadeMs: 10000, timeSec: 120 },
                NORMAL: { label: "DEFCON 2 (NORMAL)", attempts: 10, defuseKm: 5, noisePct: 0.015, superScans: 2, superFadeMs: 5000, timeSec: 60 },
                HARDCORE: { label: "DEFCON 1 (HARDCORE)", attempts: 5, defuseKm: 0.5, noisePct: 0.04, superScans: 1, superFadeMs: 2000, timeSec: 30 }
            }
        };

        // Global State & Cleanups
        let typewriterTimeout = null;
        let globalTimerInterval = null;

        /*******************************************************
         * 1. SYNTHESIZED SOUND ENGINE (Web Audio API)
         *******************************************************/
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        
        const SFX = {
            init: () => { if (!audioCtx) audioCtx = new AudioCtx(); if (audioCtx.state === 'suspended') audioCtx.resume(); },
            playTone: (freq, type, duration, vol=0.1) => {
                if(!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            },
            type: () => SFX.playTone(1200, 'square', 0.05, 0.01),
            click: () => SFX.playTone(600, 'sine', 0.1, 0.05),
            ping: () => {
                SFX.playTone(1200, 'sine', 1.5, 0.2); 
                setTimeout(() => SFX.playTone(600, 'sine', 1.0, 0.05), 150); // Echo
            },
            superScan: () => {
                if(!audioCtx) return;
                const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                osc.frequency.setValueAtTime(200, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 1.5);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 1.5);
            },
            explode: () => {
                if(!audioCtx) return;
                const bufferSize = audioCtx.sampleRate * 2;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for(let i=0; i<bufferSize; i++) data[i] = Math.random() * 2 - 1;
                const noise = audioCtx.createBufferSource(); noise.buffer = buffer;
                const filter = audioCtx.createBiquadFilter(); filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1000, audioCtx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 2);
                const gain = audioCtx.createGain(); gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 2);
                noise.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination);
                noise.start();
            },
            success: () => {
                SFX.playTone(523.25, 'sine', 0.5, 0.1); // C5
                setTimeout(() => SFX.playTone(659.25, 'sine', 0.5, 0.1), 150); // E5
                setTimeout(() => SFX.playTone(783.99, 'sine', 1.0, 0.1), 300); // G5
                setTimeout(() => SFX.playTone(1046.50, 'sine', 2.0, 0.2), 450); // C6
            }
        };

        /*******************************************************
         * 2. CRYPTO & GEO UTILITIES
         *******************************************************/
        const SECRET_KEY_PHRASE = "map-duel-fixed-secret-key-123456789";
        async function getCryptoKey() {
            const enc = new TextEncoder();
            const hash = await crypto.subtle.digest("SHA-256", enc.encode(SECRET_KEY_PHRASE));
            return crypto.subtle.importKey("raw", hash, { name: "AES-GCM" }, false, ["encrypt", "decrypt"]);
        }
        function toBase64Url(u8) { let s=''; for(let i=0;i<u8.length;i++)s+=String.fromCharCode(u8[i]); return btoa(s).replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,''); }
        function fromBase64Url(b64url) { let b64=b64url.replace(/-/g,'+').replace(/_/g,'/'); while(b64.length%4)b64+='='; let s=atob(b64); let b=new Uint8Array(s.length); for(let i=0;i<s.length;i++)b[i]=s.charCodeAt(i); return b; }
        async function encryptPayload(payload) {
            const key = await getCryptoKey(); const iv = crypto.getRandomValues(new Uint8Array(12));
            const pt = new TextEncoder().encode(JSON.stringify(payload));
            const ct = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, pt);
            const combined = new Uint8Array(iv.length + ct.byteLength);
            combined.set(iv); combined.set(new Uint8Array(ct), iv.length);
            return toBase64Url(combined);
        }
        async function decryptPayload(token) {
            const key = await getCryptoKey(); const combined = fromBase64Url(token);
            const iv = combined.slice(0, 12); const ct = combined.slice(12);
            const pt = await crypto.subtle.decrypt({ name: "AES-GCM", iv }, key, ct);
            return JSON.parse(new TextDecoder().decode(pt));
        }

        function greatCircleDistanceKm(lat1, lon1, lat2, lon2) {
            const R = CONFIG.EARTH_RADIUS_KM; const dLat = (lat2 - lat1)*Math.PI/180; const dLon = (lon2 - lon1)*Math.PI/180;
            const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        function getGeodesicPoints(lat1, lon1, lat2, lon2, numPoints = 50) {
            const points = []; const d = greatCircleDistanceKm(lat1, lon1, lat2, lon2) / CONFIG.EARTH_RADIUS_KM;
            const rLat1 = lat1*Math.PI/180, rLon1 = lon1*Math.PI/180, rLat2 = lat2*Math.PI/180, rLon2 = lon2*Math.PI/180;
            if (d < 0.0001) return [[lat1, lon1], [lat2, lon2]];
            for (let i = 0; i <= numPoints; i++) {
                const f = i/numPoints, A = Math.sin((1-f)*d)/Math.sin(d), B = Math.sin(f*d)/Math.sin(d);
                const x = A*Math.cos(rLat1)*Math.cos(rLon1) + B*Math.cos(rLat2)*Math.cos(rLon2);
                const y = A*Math.cos(rLat1)*Math.sin(rLon1) + B*Math.cos(rLat2)*Math.sin(rLon2);
                const z = A*Math.sin(rLat1) + B*Math.sin(rLat2);
                const lat = Math.atan2(z, Math.sqrt(x*x + y*y))*180/Math.PI;
                let lon = Math.atan2(y, x)*180/Math.PI;
                if (i > 0 && Math.abs(lon - points[i-1][1]) > 180) lon += (lon < points[i-1][1]) ? 360 : -360;
                points.push([lat, lon]);
            }
            return points;
        }
        const worldBounds = L.latLngBounds(L.latLng(-89.98, -180), L.latLng(89.98, 180));

        /*******************************************************
         * 3. ROUTER
         *******************************************************/
        const app = document.getElementById('app');
        
        function navigate(hash) { SFX.init(); SFX.click(); window.location.hash = hash; }
        window.addEventListener('hashchange', router); window.addEventListener('load', router);

        function router() {
            clearTimeout(typewriterTimeout);
            clearInterval(globalTimerInterval);
            
            const hash = window.location.hash || '#';
            app.innerHTML = ''; 
            if (hash === '#') renderHome();
            else if (hash === '#create') renderCreate();
            else if (hash.startsWith('#g/')) renderPlay(hash.substring(3));
            else renderHome();
        }

        /*******************************************************
         * 4. HOME VIEW
         *******************************************************/
        function renderHome() {
            app.innerHTML = `
                <div class="min-h-[100dvh] flex flex-col items-start justify-center py-12 px-6 md:px-16 lg:px-24 max-w-7xl mx-auto w-full">
                    <h1 class="font-inter-tight text-5xl md:text-8xl lg:text-9xl font-bold tracking-tighter uppercase leading-none mb-6 text-foreground shrink-0">
                        Operation:<br><span class="text-accent">Payload.</span>
                    </h1>
                    
                    <div id="briefing-container" class="text-muted-foreground text-sm md:text-base max-w-2xl mb-12 leading-relaxed font-mono min-h-[180px] md:min-h-[140px] typing-cursor shrink-0"></div>
                    
                    <div class="flex flex-col md:flex-row gap-8 w-full max-w-3xl opacity-0 transition-opacity duration-1000 shrink-0 pb-12" id="home-actions">
                        <div class="flex-1 flex flex-col">
                            <h2 class="font-mono text-sm tracking-widest uppercase text-muted-foreground mb-4">Terror Cell</h2>
                            <button onclick="navigate('#create')" class="group relative inline-flex items-center justify-center font-inter font-semibold uppercase tracking-wider text-accent transition-all duration-150 active:translate-y-px py-3 border border-accent/20 bg-accent/5 hover:bg-accent/10">
                                <span>Plant Payload</span>
                                <span class="absolute bottom-0 left-0 h-0.5 w-full bg-accent origin-left transition-transform duration-150 scale-x-100 group-hover:scale-x-110"></span>
                            </button>
                        </div>
                        <div class="hidden md:block w-px bg-border"></div>
                        <div class="flex-1 flex flex-col">
                            <h2 class="font-mono text-sm tracking-widest uppercase text-muted-foreground mb-4">Intel Agency</h2>
                            <input type="text" id="join-link" placeholder="Paste intercept URL..." class="w-full h-12 bg-input border border-border px-4 text-foreground focus:border-accent focus:outline-none transition-colors duration-150 mb-3 font-mono text-sm">
                            <button onclick="joinGame()" class="w-full uppercase tracking-wider font-semibold border border-border text-foreground px-6 py-3 transition-colors duration-150 hover:bg-foreground hover:text-background active:translate-y-px text-sm">
                                Intercept Data
                            </button>
                        </div>
                    </div>
                </div>
            `;

            const briefingText = "INCOMING TRANSMISSION... SECURE CHANNEL ESTABLISHED.\n\nCommander, the grid is volatile.\n\nIf you operate for the Rogue Cell: lock your coordinates, arm the payload, and share the telemetry to the agency so when they attempt to defuse that will activate the bomb haha.\n\nIf you command the Agency: input the intercepted link. We have to try to defuse as we can't sit and wait for the next blackmail. You will rely on orbital radar to triangulate the payload before detonation.\n\nMake your choice. Dismissed.";
            const container = document.getElementById('briefing-container');
            const actions = document.getElementById('home-actions');
            let i = 0;

            function typeWriter() {
                if (i < briefingText.length) {
                    const char = briefingText.charAt(i);
                    container.innerHTML += (char === '\n') ? '<br>' : char;
                    i++;
                    if(i % 3 === 0 && audioCtx) SFX.type(); 
                    let speed = Math.random() * 10 + 2; 
                    if (char === '.' || char === '?' || char === '!') speed += 150;
                    if (char === ',') speed += 80;
                    typewriterTimeout = setTimeout(typeWriter, speed);
                } else {
                    actions.classList.remove('opacity-0'); actions.classList.add('opacity-100');
                }
            }
            setTimeout(typeWriter, 400);
        }

        window.joinGame = function() {
            SFX.init(); SFX.click();
            const val = document.getElementById('join-link').value.trim();
            if (val.includes('#g/')) {
                window.location.hash = '#g/' + val.split('#g/')[1];
            } else if (val) {
                const jokes = [
                    "Invalid intel. Did you just intercept my grandmother's grocery list, Agent?",
                    "Orbital radar confirms: You just pasted total gibberish. Drop and give me twenty!",
                    "That link is a bigger dud than your last performance review. Try again.",
                    "Error 404: Bomb not found. Are you sure you're a real spy?",
                    "Decryption failed. You can't triangulate a cat video, Agent.",
                    "Signal degraded. This intel has less bits than a rusty spoon. Try a real link.",
                    "Invalid link! Are you working for the enemy, or just typing with your elbows?",
                    "Intel rejected. That's a negative, Ghost Rider.",
                    "Decryption failed. Stop licking the keyboard, Agent.",
                    "Invalid URL. The only thing bombing right now is your espionage career."
                ];
                alert(jokes[Math.floor(Math.random() * jokes.length)]);
            }
        }

        /*******************************************************
         * 5. CREATE GAME VIEW (P1)
         *******************************************************/
        function renderCreate() {
            app.innerHTML = `
                <div class="flex flex-col h-[100dvh] overflow-hidden">
                    <!-- Top Bar -->
                    <div class="px-4 py-3 md:px-6 md:py-4 border-b border-border flex justify-between items-center bg-background z-10 shrink-0 shadow-md">
                        <button onclick="navigate('#')" class="font-mono text-sm tracking-widest uppercase text-muted-foreground hover:text-foreground transition-colors shrink-0 mr-4">← Abort</button>
                        <h2 class="font-inter-tight font-bold text-foreground tracking-tight uppercase truncate min-w-0 flex-1 text-right md:text-center">Deploy Payload</h2>
                        <div class="w-16 shrink-0 hidden md:block"></div>
                    </div>
                    
                    <!-- Split Layout -->
                    <div class="flex-grow flex flex-col md:flex-row min-h-0 relative">
                        <!-- Map Container -->
                        <div id="map-create" class="w-full h-1/2 md:h-full md:flex-grow z-0 cursor-crosshair shrink-0 md:shrink"></div>
                        
                        <!-- Control Panel -->
                        <div class="w-full h-1/2 md:w-[420px] md:h-full bg-background flex flex-col z-10 md:border-l border-border shrink-0 shadow-[0_-10px_30px_rgba(0,0,0,0.5)] md:shadow-none">
                            <div class="p-6 overflow-y-auto flex-grow">
                                <h3 class="font-inter-tight text-2xl font-bold mb-6 text-foreground tracking-tight uppercase">Parameters</h3>
                                <div class="mb-4">
                                    <label class="block font-mono text-xs text-muted-foreground mb-2 uppercase tracking-widest">Terror Callsign</label>
                                    <input type="text" id="p1-name" placeholder="e.g. ALPHA" class="w-full h-12 bg-input border border-border px-4 text-foreground focus:border-accent focus:outline-none transition-colors duration-150 font-mono">
                                </div>
                                <div class="mb-6">
                                    <label class="block font-mono text-xs text-muted-foreground mb-2 uppercase tracking-widest">Threat Level</label>
                                    <select id="p1-threat" class="w-full h-12 bg-input border border-border px-4 text-foreground focus:border-accent focus:outline-none appearance-none font-mono transition-colors duration-150">
                                        <option value="EASY">${CONFIG.THREATS.EASY.label}</option>
                                        <option value="NORMAL" selected>${CONFIG.THREATS.NORMAL.label}</option>
                                        <option value="HARDCORE">${CONFIG.THREATS.HARDCORE.label}</option>
                                    </select>
                                </div>
                                <div id="selection-status" class="text-sm font-mono text-muted-foreground p-4 border border-border bg-input">
                                    AWAITING COORDINATES...<br>Click map to arm payload.
                                </div>
                            </div>
                            <button id="generate-btn" disabled class="w-full uppercase tracking-wider font-semibold border-t border-accent bg-background text-accent px-6 py-5 transition-colors duration-150 hover:bg-accent hover:text-background active:translate-y-px disabled:border-border disabled:text-muted-foreground disabled:hover:bg-transparent disabled:active:translate-y-0 shrink-0">
                                Encrypt Intel
                            </button>
                        </div>
                    </div>
                    
                    <!-- Share Overlay -->
                    <div id="share-overlay" class="hidden absolute inset-0 bg-background/95 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                        <div class="max-w-xl w-full p-8 md:p-10 border border-border bg-card shadow-2xl">
                            <h3 class="font-inter-tight text-3xl md:text-4xl font-bold mb-2 text-accent uppercase tracking-tight">Armed & Ready</h3>
                            <p class="font-mono text-sm text-muted-foreground mb-8">Transmit this secure link to the agency.</p>
                            <input type="text" id="share-url" readonly class="w-full h-12 bg-input border border-border px-4 text-xs text-muted-foreground mb-6 select-all font-mono focus:outline-none focus:border-accent">
                            <div class="flex flex-col sm:flex-row gap-4">
                                <button onclick="copyShareLink()" class="flex-1 uppercase tracking-wider font-semibold bg-foreground text-background px-6 py-3 transition-transform duration-150 active:translate-y-px text-sm">Copy URL</button>
                                <button onclick="navigate('#')" class="uppercase tracking-wider font-semibold border border-border text-muted-foreground px-6 py-3 hover:text-foreground active:translate-y-px text-sm">Return Base</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const map = L.map('map-create', { center: [20, 0], zoom: 2, minZoom: 2, maxZoom: 19, zoomControl: true, maxBounds: worldBounds, maxBoundsViscosity: 1.0 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19, noWrap: true }).addTo(map);
            setTimeout(() => map.invalidateSize(), 150);

            let exactPoint = null, radiusCircle = null, selectedLat = null, selectedLng = null;

            map.on('click', function(e) {
                SFX.click();
                selectedLat = e.latlng.lat; selectedLng = e.latlng.lng;
                if (exactPoint) map.removeLayer(exactPoint);
                if (radiusCircle) map.removeLayer(radiusCircle);
                
                exactPoint = L.circleMarker([selectedLat, selectedLng], { radius: 3, fillColor: "#FF3D00", color: "#0A0A0A", weight: 1, opacity: 1, fillOpacity: 1 }).addTo(map);
                const threatKey = document.getElementById('p1-threat').value;
                const defKm = CONFIG.THREATS[threatKey].defuseKm;
                
                radiusCircle = L.circle([selectedLat, selectedLng], { radius: defKm * 1000, color: "#262626", weight: 1, fillOpacity: 0.1, dashArray: "4, 4" }).addTo(map);
                document.getElementById('selection-status').innerHTML = `<span class="text-accent">PAYLOAD ARMED.</span><br>${defKm}km defusal zone visualized.`;
                checkForm();
            });

            document.getElementById('p1-threat').addEventListener('change', (e) => { SFX.click(); if(selectedLat) map.fireEvent('click', {latlng: {lat: selectedLat, lng: selectedLng}}); });
            document.getElementById('p1-name').addEventListener('input', checkForm);
            
            function checkForm() {
                const name = document.getElementById('p1-name').value.trim();
                const btn = document.getElementById('generate-btn');
                if (name && selectedLat !== null) btn.removeAttribute('disabled');
                else btn.setAttribute('disabled', 'true');
            }

            document.getElementById('generate-btn').addEventListener('click', async () => {
                SFX.click();
                const payload = { v: 2, lat: selectedLat, lng: selectedLng, name: document.getElementById('p1-name').value.trim(), threat: document.getElementById('p1-threat').value };
                try {
                    const token = await encryptPayload(payload);
                    document.getElementById('share-url').value = `${window.location.href.split('#')[0]}#g/${token}`;
                    document.getElementById('share-overlay').classList.remove('hidden');
                } catch(e) { console.error(e); }
            });

            window.copyShareLink = function() {
                SFX.click();
                const urlInput = document.getElementById('share-url'); urlInput.select(); document.execCommand('copy'); alert("URL copied to clipboard.");
            }
        }

        /*******************************************************
         * 6. PLAY GAME VIEW (P2)
         *******************************************************/
        async function renderPlay(token) {
            app.innerHTML = `<div class="flex items-center justify-center h-[100dvh]"><div class="font-mono text-muted-foreground animate-pulse tracking-widest text-sm">DECRYPTING INTEL...</div></div>`;
            
            let gameData;
            try {
                gameData = await decryptPayload(token);

            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map); setTimeout(() => map.invalidateSize(), 150);
            let ep=null, rc=null, sLat=null, sLng=null;

            map.on('click', function(e) {
                SFX.click(); sLat=e.latlng.lat; sLng=e.latlng.lng;
                if(ep) map.removeLayer(ep); if(rc) map.removeLayer(rc);
                ep = L.circleMarker([sLat, sLng], {radius:3, fillColor:"#FF3D00", color:"#0A0A0A", weight:1, fillOpacity:1}).addTo(map);
                const tk = document.getElementById('p1-threat').value; const defKm = CONFIG.THREATS[tk].defuseKm;
                rc = L.circle([sLat, sLng], {radius:defKm*1000, color:"#262626", weight:1, fillOpacity:0.1, dashArray:"4, 4"}).addTo(map);
                document.getElementById('selection-status').innerHTML = `<span class="text-accent">PAYLOAD ARMED.</span><br>${defKm}km defusal zone visualized.`; checkForm();
            });
            document.getElementById('p1-threat').addEventListener('change', () => { SFX.click(); if(sLat) map.fireEvent('click',{latlng:{lat:sLat,lng:sLng}}); });
            document.getElementById('p1-name').addEventListener('input', checkForm);
            function checkForm() {
                const btn = document.getElementById('generate-btn');
                if(document.getElementById('p1-name').value.trim() && sLat!==null) btn.removeAttribute('disabled'); else btn.setAttribute('disabled', 'true');
            }
            document.getElementById('generate-btn').addEventListener('click', async () => {
                SFX.click();
                try {
                    const t = await encryptPayload({ v:2, lat:sLat, lng:sLng, name:document.getElementById('p1-name').value.trim(), threat:document.getElementById('p1-threat').value });
                    document.getElementById('share-url').value = `${window.location.href.split('#')[0]}#g/${t}`;
                    document.getElementById('share-overlay').classList.remove('hidden');
                } catch(e) {}
            });
            window.copyShareLink = () => { SFX.click(); document.getElementById('share-url').select(); document.execCommand('copy'); alert("URL copied."); }
        }

        async function renderPlay(token) {
            app.innerHTML = `<div class="flex items-center justify-center h-[100dvh]"><div class="font-mono text-muted-foreground animate-pulse tracking-widest text-sm">DECRYPTING INTEL...</div></div>`;
            let gData;
            try { gData = await decryptPayload(token); if(!gData.name || !gData.threat) throw new Error(); } 
            catch(e) { app.innerHTML = `<div class="flex items-center justify-center h-full"><h2 class="text-accent font-bold">CORRUPT INTEL.</h2></div>`; return; }

            const RULES = CONFIG.THREATS[gData.threat];
            const gState = { g: [], max: RULES.attempts, s: { lat: gData.lat, lng: gData.lng }, fin: false };
            let tLeft = RULES.superScans; let tArmed = false; let time = RULES.timeSec;

            app.innerHTML = `
                <div class="flex flex-col h-[100dvh] overflow-hidden">
                    <div class="px-4 py-3 md:px-6 md:py-4 border-b border-border flex justify-between items-center bg-background z-10 shrink-0 shadow-md">
                        <h2 class="font-inter-tight font-bold text-muted-foreground tracking-tight uppercase truncate min-w-0 flex-1 pr-4">CELL: <span class="text-foreground">${gData.name}</span></h2>
                        <div class="font-mono text-sm font-bold tracking-widest flex gap-4 md:gap-6 shrink-0 justify-end">
                            <span class="text-accent" id="countdown-timer">T-${time}s</span>
                            <span class="text-muted-foreground hidden md:inline">SCANS: <span id="attempts-left" class="text-foreground">${gState.max}</span></span>
                        </div>
                    </div>
                    <div class="flex-grow flex flex-col md:flex-row min-h-0 relative">
                        <div id="map-play" class="w-full h-1/2 md:h-full md:flex-grow z-0 cursor-crosshair shrink-0 md:shrink"></div>
                        <div id="toast" class="absolute top-4 right-1/2 translate-x-1/2 md:translate-x-0 md:right-8 md:left-auto px-6 py-3 transition-opacity duration-150 opacity-0 pointer-events-none z-[70] font-mono text-sm tracking-widest shadow-2xl uppercase font-bold text-nowrap"></div>
                        <div class="w-full h-1/2 md:w-[420px] md:h-full bg-background flex flex-col z-10 md:border-l border-border shrink-0">
                            <div class="p-4 border-b border-border bg-background shrink-0">
                                <button id="tri-btn" class="w-full uppercase font-semibold border border-accent text-accent px-4 py-3 text-xs hover:bg-accent hover:text-background">DEPLOY TRIANGULATION [${tLeft} LEFT]</button>
                            </div>
                            <div id="hist" class="flex-grow overflow-y-auto p-6 space-y-0 relative">
                                <div id="status-container"></div>
                                <p id="awaiting-text" class="font-mono text-xs text-muted-foreground mt-2 uppercase">${RULES.label}<br>DEFUSE: &le; ${RULES.defuseKm} KM<br>AWAITING SCAN.</p>
                            </div>
                        </div>
                        <div id="hud-overlay" class="hidden absolute inset-0 bg-background/50 backdrop-blur-[2px] z-[60] flex items-center justify-center pointer-events-none">
                            <div class="flex flex-col items-center gap-4"><div class="w-16 h-16 border-2 border-accent border-t-transparent rounded-full animate-spin"></div><p id="hud-text" class="font-mono text-sm text-accent uppercase font-bold bg-background/90 px-4 py-2 border border-accent">PINGING...</p></div>
                        </div>
                    </div>
                </div>
            `;
            const map = L.map('map-play', { center:[20,0], zoom:2, minZoom:2, maxZoom:19, zoomControl:true, maxBounds:L.latLngBounds([-89.98,-180],[89.98,180]) });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_nolabels/{z}/{x}/{y}{r}.png').addTo(map); setTimeout(() => map.invalidateSize(), 150);
            let rl = L.layerGroup().addTo(map);

            function showToast(msg, type="normal") {
                const t = document.getElementById('toast'); t.innerHTML = msg;
                t.className = `absolute top-4 right-1/2 translate-x-1/2 md:translate-x-0 md:right-8 md:left-auto px-6 py-3 transition-opacity duration-150 pointer-events-none z-[70] font-mono text-sm uppercase font-bold text-nowrap ` + (type==="super"?"bg-accent text-background border-accent":type==="warning"?"bg-warning text-background border-warning":"bg-muted text-foreground border-border");
                t.style.opacity='1'; setTimeout(()=>t.style.opacity='0',2500);
            }

            globalTimerInterval = setInterval(() => {
                if(gState.fin) { clearInterval(globalTimerInterval); return; }
                time--; const tmr=document.getElementById('countdown-timer'); tmr.innerText=`T-${time}s`;
                if(time<=10 && time>0) { tmr.classList.replace('text-accent','text-detonated'); SFX.click(); }
                if(time<=0) { clearInterval(globalTimerInterval); endGame(false, getBest(), "TIME EXPIRED"); }
            }, 1000);

            document.getElementById('tri-btn').addEventListener('click', (e) => {
                SFX.click(); if(tLeft>0 && !gState.fin) { tArmed=true; e.target.innerText="ARMED: SELECT MAP TARGET"; e.target.classList.add('bg-accent','text-background'); }
            });

            map.on('click', function(e) {
                if(gState.fin) return;
                const glat=e.latlng.lat, glng=e.latlng.lng, td=getDistKm(glat,glng,gState.s.lat,gState.s.lng);
                const latMs = Math.round(CONFIG.LATENCY_BASE_MS+(td*CONFIG.LATENCY_PER_KM_MS));
                const hud = document.getElementById('hud-overlay'); document.getElementById('hud-text').innerText=`PING EST ${latMs}ms`;
                hud.classList.remove('hidden'); SFX.ping();
                setTimeout(() => { hud.classList.add('hidden'); process(glat,glng,td); }, latMs);
            });

            function process(lat, lng, td) {
                if(gState.fin) return;
                let isSup=tArmed; tArmed=false; if(isSup) tLeft--;
                const isDeg=td>CONFIG.HEMISPHERE_THRESHOLD_KM;
                let noDist=Math.max(0, td+((Math.random()*2-1)*(td*RULES.noisePct*(isDeg?CONFIG.HEMISPHERE_NOISE_MULT:1))));
                let comp="---", isDef=td<=RULES.defuseKm;
                if(gState.g.length>0) { const prev=gState.g[gState.g.length-1].tDist; if(td<prev) comp="CLOSER"; else if(td>prev) comp="FARTHER"; }
                gState.g.push({ lat:lat, lng:lng, tDist:td, dDist:noDist, comp:comp, isDef:isDef, isDeg:isDeg });
                L.circleMarker([lat,lng], {radius:2, fillColor:isSup?"#FF3D00":"#FAFAFA", color:"#0A0A0A", weight:1, fillOpacity:1}).addTo(map);

                if(isDeg) { SFX.click(); showToast(`DEGRADED SIGNAL`, "warning"); }
                else if(isSup) {
                    let rad=L.circle([lat,lng],{radius:noDist*1000,color:"#FF3D00",weight:2,fillColor:"#FF3D00",fillOpacity:0.08,dashArray:"4, 8"}).addTo(map);
                    SFX.superScan(); showToast(`SUPER SCAN: ${noDist.toFixed(0)}KM`, "super");
                    setTimeout(()=>map.removeLayer(rad), RULES.superFadeMs);
                } else { SFX.click(); showToast(`SCAN: ${noDist.toFixed(0)}KM`, "normal"); }
                updateUI();
            }

            function updateUI() {
                if(gState.fin) return;
                const aw=document.getElementById('awaiting-text'); if(aw) aw.style.display='none';
                document.getElementById('attempts-left').innerText=gState.max-gState.g.length;
                const tb=document.getElementById('tri-btn');
                if(tLeft>0) { tb.className="w-full uppercase font-semibold border border-accent text-accent px-4 py-3 text-xs hover:bg-accent hover:text-background"; tb.innerText=`DEPLOY TRIANGULATION [${tLeft} LEFT]`; }
                else { tb.disabled=true; tb.className="w-full uppercase font-semibold border border-border text-muted-foreground px-4 py-3 text-xs opacity-50"; tb.innerText=`DEPLETED`; }
                
                const l=gState.g[gState.g.length-1], idx=String(gState.g.length).padStart(2,'0');
                const row=document.createElement('div'); row.className="py-4 border-b border-border flex justify-between items-end font-mono text-sm";
                row.innerHTML=`<div class="flex flex-col gap-1"><span class="text-xs ${l.isDeg?'text-warning':'text-muted-foreground'}">SCAN ${idx} ${l.isDeg?'[DEGRADED]':''}</span><span class="text-foreground text-lg">~${l.dDist.toFixed(0)} KM</span></div><span class="font-bold ${l.isDef?'text-defused':'text-muted-foreground'}">${l.comp}</span>`;
                document.getElementById('status-container').after(row);
                
                if(l.isDef) endGame(true, l.tDist, "TARGET SECURED"); else if(gState.g.length>=gState.max) endGame(false, getBest(), "SCANS DEPLETED");
            }

            function getBest() { return gState.g.length===0?0:Math.min(...gState.g.map(g=>g.tDist)); }

            function endGame(won, bDist, rsn) {
                if(gState.fin) return; gState.fin=true; clearInterval(globalTimerInterval);
                document.getElementById('tri-btn').disabled=true; const f=document.getElementById('flash-overlay');
                
                if(won) {
                    SFX.success(); f.className="pointer-events-none fixed inset-0 z-[100] transition-opacity duration-1000 bg-defused/30 opacity-100";
                    setTimeout(()=>f.classList.replace('opacity-100','opacity-0'),100);
                    let pls=L.circle([gState.s.lat,gState.s.lng],{radius:1000,color:"#22c55e",weight:3,fillColor:"#22c55e",fillOpacity:0.6}).addTo(rl);
                    let pr=1000, pa=setInterval(()=>{pr+=1000;pls.setRadius(pr);pls.setStyle({opacity:Math.max(0,1-pr/40000),fillOpacity:Math.max(0,0.6-pr/40000)});if(pr>40000)clearInterval(pa);},30);
                    document.getElementById('status-container').innerHTML=`<div class="mb-6 p-6 border border-defused bg-defused/10"><h2 class="font-inter-tight text-3xl font-bold mb-2 text-defused uppercase">Defused</h2><p class="font-mono text-xs text-defused mb-6 uppercase opacity-80">${rsn}.<br>Neutralized in ${gState.g.length} scans.</p><button onclick="navigate('#')" class="w-full uppercase font-semibold bg-defused text-background px-4 py-3 text-xs hover:bg-white">Return Base</button></div>`;
                } else {
                    SFX.explode(); f.className="pointer-events-none fixed inset-0 z-[100] transition-opacity duration-1000 bg-detonated/40 opacity-100";
                    setTimeout(()=>f.classList.replace('opacity-100','opacity-0'),100);
                    let bl=L.circle([gState.s.lat,gState.s.lng],{radius:1000,color:"#ef4444",weight:0,fillColor:"#ef4444",fillOpacity:0.8}).addTo(rl);
                    let br=1000, ba=setInterval(()=>{br+=20000;bl.setRadius(br);bl.setStyle({fillOpacity:Math.max(0,0.8-br/1000000)});if(br>1000000)clearInterval(ba);},30);
                    L.circleMarker([gState.s.lat,gState.s.lng],{radius:5,fillColor:"#ef4444",color:"#0A0A0A",weight:2,fillOpacity:1}).addTo(rl);
                    document.getElementById('status-container').innerHTML=`<div class="mb-6 p-6 border border-detonated bg-detonated/10"><h2 class="font-inter-tight text-3xl font-bold mb-2 text-detonated uppercase">Detonation</h2><p class="font-mono text-xs text-detonated mb-6 uppercase opacity-80">${rsn}.<br>Best dist: ${bDist.toFixed(1)} KM.</p><button onclick="navigate('#')" class="w-full uppercase font-semibold bg-detonated text-background px-4 py-3 text-xs hover:bg-white">Return Base</button></div>`;
                }
                if(gState.g.length>0) {
                    let best=gState.g.reduce((p,c)=>(p.tDist<c.tDist)?p:c);
                    L.polyline(getGeoPoints(best.lat,best.lng,gState.s.lat,gState.s.lng),{color:won?'#22c55e':'#ef4444',dashArray:'4,4',weight:2,opacity:0.8}).addTo(rl);
                    map.fitBounds(L.latLngBounds([[best.lat,best.lng],[gState.s.lat,gState.s.lng]]), {padding:[30,30],maxZoom:10});
                }
            }
        }
    </script>
</body>
